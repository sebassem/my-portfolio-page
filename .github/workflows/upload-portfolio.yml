name: Upload Portfolio Content

on:
  # Run when markdown files in portfolio folder change
  push:
    branches:
      - main
    paths:
      - 'astro/src/content/portfolio/**'
  
  # Allow manual trigger
  workflow_dispatch:

permissions:
  id-token: write  # Required for OIDC authentication
  contents: read

env:
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
  STORAGE_ACCOUNT_NAME: ${{ secrets.STORAGE_ACCOUNT_NAME }}

jobs:
  upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: false

      - name: Ensure container exists
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage container create \
              --name ${{ env.CONTAINER_NAME }} \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --auth-mode login \
              --only-show-errors || true

      - name: Upload portfolio markdown files
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --destination ${{ env.CONTAINER_NAME }} \
              --source ./astro/src/content/portfolio \
              --auth-mode login \
              --overwrite true \
              --pattern "*.md" \
              --only-show-errors
            
            echo "✅ Uploaded portfolio files to storage account"

      - name: List uploaded files
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "📁 Files in container:"
            az storage blob list \
              --account-name ${{ env.STORAGE_ACCOUNT_NAME }} \
              --container-name ${{ env.CONTAINER_NAME }} \
              --auth-mode login \
              --query "[].name" \
              --output tsv
